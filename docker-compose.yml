services:
  postgres:
    image: postgres:16-alpine
    container_name: treinos-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: treinos_api
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d treinos_api"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
